<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiply By 2 Adventure!</title>
    <!-- Use a fun Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div class="lang-controls">
            <button id="lang-btn-en" class="lang-btn active" onclick="app.setLang('en')">EN</button>
            <button id="lang-btn-af" class="lang-btn" onclick="app.setLang('af')">AF</button>
        </div>
        <!-- Header -->
        <header class="app-header">
            <h1 id="app-title">🚀 Multiply By 2 Adventure! 🌟</h1>
            <p id="app-subtitle">Ready to explore space with numbers?</p>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Screens will be injected here by app.js -->
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
